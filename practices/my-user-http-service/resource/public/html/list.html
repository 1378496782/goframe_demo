<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../resource/css/style.css">

<body>

    <footer class="footer">
        <p>© 2026 用户管理系统 - 基于 GoFrame 框架</p>
