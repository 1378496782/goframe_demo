<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 用户管理系统</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
    <link rel="stylesheet" href="../resource/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">用户管理系统</a>
            <div class="nav-links">
                <a href="index.html">首页</a>
                <a href="list.html">用户列表</a>
                <a href="login.html">登录</a>
                <a href="signup.html" class="active">注册</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="auth-form">
            <h1>用户注册</h1>
            <form id="signupForm">
                <div class="form-group">
                    <label for="passport">账号（Passport）</label>
                    <input type="text" id="passport" name="passport" placeholder="请输入账号（6-16 字符）" required
                        autocomplete="username" minlength="6" maxlength="16">
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码（6-16 字符）" required
                        autocomplete="new-password" minlength="6" maxlength="16">
                    <span class="input-icon" id="togglePassword" title="显示/隐藏密码">👁️</span>
                    <div class="password-strength">
                        <div class="password-strength-bar" id="passwordStrengthBar"></div>
                    </div>
                    <div class="password-strength-text" id="passwordStrengthText"></div>
                </div>
                <div class="form-group">
                    <label for="password2">确认密码</label>
                    <input type="password" id="password2" name="password2" placeholder="请再次输入密码" required
                        autocomplete="new-password">
                    <span class="input-icon" id="togglePassword2" title="显示/隐藏密码">👁️</span>
                </div>
                <div class="form-group">
                    <label for="nickname">昵称（可选）</label>
                    <input type="text" id="nickname" name="nickname" placeholder="请输入昵称，不填则用账号作为昵称"
                        autocomplete="nickname">
                </div>
                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>
                <button type="submit" class="btn btn-primary btn-full" id="signupBtn">注册</button>
            </form>
            <p class="auth-link">
                已有账号？<a href="login.html">立即登录</a>
            </p>
        </div>
    </div>

    <footer class="footer">
        <p>© 2026 用户管理系统 - 基于 GoFrame 框架</p>
    </footer>

    <script src="../resource/js/common.js"></script>
    <script src="../resource/js/signup.js"></script>
</body>

</html>
