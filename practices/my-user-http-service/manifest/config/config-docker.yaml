# https://goframe.org/docs/web/server-config-file-template
server:
  address:     ":8000"
  openapiPath: "/api.json"
  swaggerPath: "/swagger"

# https://goframe.org/docs/core/glog-config
logger:
  level : "all"
  stdout: true

# https://goframe.org/docs/core/gdb-config-file
database:
  default:
    type: "mysql"
    host: "mysql"
    port: "3306"
    user: "root"
    pass: "12345678"
    name: "test"
    role: "master"
    debug: true
    charset: "utf8mb4"
    timezone: "Asia/Shanghai"
